<%+cbi/valueheader%>

<div class="cbi-value-field" id="city-select-container">

    <!-- Select Kota (UI only) -->
    <select class="cbi-input-select" id="city-select">
        <option value=""><%= translate("-- Pilih Kota --") %></option>
    </select>

    <!-- Loader -->
    <div id="city-loading" style="display:none;margin-top:4px;">
        <img src="<%= resource %>/icons/loading.gif" width="16" height="16" />
        <span><%= translate("Memuat data kota...") %></span>
    </div>

    <!-- Info Kota -->
    <div class="cbi-value-description" style="margin-top:8px;">
        <strong><%= translate("Kota Terpilih:") %></strong>
        <span id="saved-city-label" style="margin-left:5px;"></span>
        <span id="city-change-notice"
              style="display:none;color:#ff9800;margin-left:8px;">
            (<%= translate("Perubahan belum disimpan") %>)
        </span>
    </div>

    <!-- Info Zona Waktu -->
    <div class="cbi-value-description" style="margin-top:8px;">
        <strong><%= translate("Zona Waktu:") %></strong>
        <span id="tz-display">WIB</span>
    </div>

</div>

<%+cbi/valuefooter%>

<script type="text/javascript">
(function () {
    'use strict';

    /* ========= UTIL ========= */
    function $(q) { return document.querySelector(q); }
    function log(m, d) { console.log('[JSHOLAT]', m, d || ''); }

    /* ========= HIDDEN FIELD (CBI OWNED) ========= */
    function field(name) {
        return document.querySelector(
            'input[name="cbid.jsholat.schedule.' + name + '"]'
        );
    }

    const cityValue   = () => field('city_value');
    const cityLabel   = () => field('city_label');
    const timezoneVal = () => field('timezone_value');

    const citySelect = $('#city-select');
    const loader     = $('#city-loading');
    const notice     = $('#city-change-notice');

    /* ========= LOADER ========= */
    function showLoading(show) {
        if (loader) loader.style.display = show ? 'block' : 'none';
        if (citySelect) citySelect.disabled = show;
    }

    /* ========= AJAX ========= */
    function ajax(url, params) {
        const q = params
            ? '?' + Object.keys(params).map(k =>
                encodeURIComponent(k) + '=' + encodeURIComponent(params[k])
              ).join('&')
            : '';
        return fetch(url + q).then(r => r.json());
    }

    /* ========= APPLY TIMEZONE (INIT ONLY) ========= */
    function applyInitialTimezone(city) {
        log('Applying initial timezone for:', city);

        ajax('<%= url("admin/services/jsholat/get_timezone") %>', { city })
            .then(res => {
                if (!res || res.status !== 'success') return;

                $('#tz-display').textContent = res.timezone || 'WIB';
                $('#saved-city-label').textContent = res.city_label || '';

                cityValue().value   = city;
                cityLabel().value   = res.city_label || '';
                timezoneVal().value = res.timezone || 'WIB';

                // ⛔ init load → TIDAK tampilkan notice
                notice.style.display = 'none';
            });
    }

    /* ========= UPDATE TIMEZONE (USER ACTION) ========= */
    function updateTimezone(city) {
        log('Updating timezone for:', city);

        ajax('<%= url("admin/services/jsholat/get_timezone") %>', { city })
            .then(res => {
                if (!res || res.status !== 'success') return;

                $('#tz-display').textContent = res.timezone || 'WIB';
                $('#saved-city-label').textContent = res.city_label || '';

                cityValue().value   = city;
                cityLabel().value   = res.city_label || '';
                timezoneVal().value = res.timezone || 'WIB';

                // ✅ user action → tampilkan notice
                notice.style.display = 'inline';
            });
    }

    /* ========= LOAD CITIES ========= */
    function loadCities(province, selectedCity) {
        log('Loading cities for:', province);

        citySelect.innerHTML =
            '<option value=""><%= translate("-- Pilih Kota --") %></option>';

        showLoading(true);

        ajax('<%= url("admin/services/jsholat/get_cities") %>', { province })
            .then(res => {
                showLoading(false);
                if (!res || res.status !== 'success') return;

                res.cities.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.value;
                    opt.textContent = c.label;
                    citySelect.appendChild(opt);
                });

                if (selectedCity) {
                    citySelect.value = selectedCity;
                    applyInitialTimezone(selectedCity);
                }
            })
            .catch(() => showLoading(false));
    }

    /* ========= INIT ========= */
    function init() {
        const provinceSelect = document.querySelector(
            'select[name="cbid.jsholat.schedule.province"]'
        );

        if (!provinceSelect || !citySelect || !cityValue()) {
            return setTimeout(init, 300);
        }

        /* === Load initial data === */
        ajax('<%= url("admin/services/jsholat/get_init_data") %>')
            .then(res => {
                log('Initial data:', res);

                if (res.province) {
                    provinceSelect.value = res.province;
                    loadCities(res.province, res.city);
                }

                $('#tz-display').textContent = res.timezone || 'WIB';
                $('#saved-city-label').textContent = res.city_label || '';
                notice.style.display = 'none';
            });

        /* === Province changed === */
        provinceSelect.addEventListener('change', () => {
            citySelect.innerHTML =
                '<option value=""><%= translate("-- Pilih Kota --") %></option>';

            $('#tz-display').textContent = 'WIB';
            $('#saved-city-label').textContent = '';
            notice.style.display = 'none';

            cityValue().value   = '';
            cityLabel().value   = '';
            timezoneVal().value = 'WIB';

            if (provinceSelect.value) {
                loadCities(provinceSelect.value);
            }
        });

        /* === City changed (USER ACTION) === */
        citySelect.addEventListener('change', () => {
            if (citySelect.value) {
                updateTimezone(citySelect.value);
            }
        });
    }

    setTimeout(init, 800);

})();
</script>
